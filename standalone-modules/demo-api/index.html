<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>Demo API</title>
  <link rel="stylesheet" href="landing.css" />
</head>
<body>
  <main>
    <h1>Demo API — Standalone Module</h1>
    <p>صفحه landing این ماژول روی هاست سرو می‌شود؛ API از Docker پروکسی می‌شود.</p>
    <p><a href="/">بازگشت به صفحه اصلی</a></p>
    <button id="checkApi">بررسی /api/health</button>
    <pre id="output">...</pre>
  </main>
  <script>
    document.getElementById('checkApi').onclick = async () => {
      const out = document.getElementById('output');
      try {
        const res = await fetch('/modules/demo-api/api/health');
        out.textContent = res.status + ' ' + JSON.stringify(await res.json(), null, 2);
      } catch (e) {
        out.textContent = 'خطا: ' + e.message;
      }
    };
  </script>
</body>
</html>
