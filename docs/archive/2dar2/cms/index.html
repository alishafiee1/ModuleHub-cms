<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CMS Module | HaderBash</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="cms-style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body id="cmsBody" class="light-theme">
    <div class="cms-container">
        <!-- هدر CMS با نورپردازی -->
        <div class="cms-header">
            <div class="cms-logo">
                <i class="fas fa-puzzle-piece"></i>
                <h2>مدیریت ماژول‌ها</h2>
                <span class="cms-badge">CMS v2.0</span>
            </div>
            <div class="cms-controls">
                <button class="cms-dark-btn" id="cmsDarkBtn">
                    <i class="fas fa-moon"></i>
                    <span>دارک مود</span>
                </button>
            </div>
        </div>

        <!-- بنر قابلیت‌ها با نورپردازی -->
        <div class="cms-features">
            <div class="cms-feature-chip"><i class="fas fa-folder-tree"></i> پوشه مجازی</div>
            <div class="cms-feature-chip"><i class="fas fa-cloud-upload-alt"></i> آپلود ZIP</div>
            <div class="cms-feature-chip"><i class="fab fa-docker"></i> Docker</div>
            <div class="cms-feature-chip"><i class="fas fa-microchip"></i> محدودیت منابع</div>
            <div class="cms-feature-chip"><i class="fas fa-database"></i> کش پکیج</div>
            <div class="cms-feature-chip"><i class="fas fa-history"></i> لاگ متمرکز</div>
        </div>

        <!-- مسیریابی (breadcrumb) -->
        <div class="cms-breadcrumb" id="cmsBreadcrumb">
            <div class="breadcrumb-list">
                <div class="breadcrumb-item active" data-folder="root">
                    <i class="fas fa-home"></i> خانه
                </div>
            </div>
        </div>

        <!-- گرید کارت‌های ماژول‌ها با نورپردازی -->
        <div class="cms-grid" id="cmsGrid">
            <!-- کارت‌ها توسط JS ساخته می‌شوند -->
        </div>

        <!-- توضیحات پایین -->
        <div class="cms-note">
            <i class="fas fa-lightbulb"></i>
            <strong>مدیریت ماژول‌های HaderBash</strong> — ماژول‌ها را اجرا/توقف کن، منابع را تنظیم کن، لاگ ببین و ماژول جدید اضافه کن.
        </div>
    </div>

    <script src="cms-script.js"></script>
</body>
</html>
