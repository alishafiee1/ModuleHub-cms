<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
    body { margin: 0; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    header { padding: 1rem 1.5rem; background: #1e293b; display: flex; justify-content: space-between; align-items: center; }
    main { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem; }
    .tile { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1rem; position: relative; cursor: pointer; }
    .tile.settings-pending { border-color: #f59e0b; }
    .status { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-left: 6px; }
    .status.running, .status.static { background: #22c55e; }
    .status.stopped { background: #64748b; }
    .status.settings_pending, .status.installing { background: #f59e0b; }
    .status.error { background: #ef4444; }
    .actions { margin-top: 0.75rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
    button { background: #2563eb; color: #fff; border: none; padding: 0.4rem 0.75rem; border-radius: 6px; cursor: pointer; }
    button.danger { background: #dc2626; }
    button.secondary { background: #475569; }
    #login { max-width: 360px; margin: 4rem auto; background: #1e293b; padding: 2rem; border-radius: 12px; }
    input, input[type=file], select, textarea { width: 100%; padding: 0.5rem; margin: 0.5rem 0 1rem; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: #e2e8f0; }
    .upload { background: #1e293b; padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; }
    .warn { color: #fbbf24; font-size: 0.85rem; margin-top: 0.5rem; }
    .tooltip { display: none; position: absolute; top: 2rem; left: 1rem; background: #0f172a; border: 1px solid #334155; padding: 0.5rem; border-radius: 6px; font-size: 0.8rem; z-index: 10; }
    .tile:hover .tooltip { display: block; }
    .settings-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
    .settings-panel.open { display: flex; }
    .settings-form { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.25rem; width: min(520px, 100%); max-height: 90vh; overflow-y: auto; }
    .settings-form h3 { margin-top: 0; }
    .settings-form label { display: block; font-size: 0.9rem; margin-bottom: 0.25rem; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .settings-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
    .tile-gear { position: absolute; top: 8px; left: 8px; width: 32px; height: 32px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #94a3b8; cursor: pointer; }
    .tile-gear:hover { color: #e2e8f0; border-color: #64748b; }
    .gear-quick-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 110; align-items: center; justify-content: center; padding: 1rem; }
    .gear-quick-panel.open { display: flex; }
    .gear-quick-form { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.25rem; width: min(420px, 100%); }
  </style>
</head>
<body>
  <div id="login">
    <h2>ورود مدیر</h2>
    <input id="password" type="password" placeholder="رمز عبور" />
    <button onclick="login()">ورود</button>
    <p id="loginError" style="color:#ef4444"></p>
  </div>

  <div id="app" style="display:none">
    <header>
      <h1>ModuleHub CMS</h1>
      <button class="secondary" onclick="logout()">خروج</button>
    </header>
    <main>
      <div class="upload">
        <h3>نصب ماژول standalone (ZIP)</h3>
        <p class="warn">پس از آپلود، Docker برای تنظیمات بالا می‌آید — فرم Settings را تکمیل کنید.</p>
        <p class="warn">کنترل Start/Stop روی <a href="/" style="color:#4fc3f7">صفحه اصلی</a> هم در دسترس است (پس از ورود).</p>
        <input id="zipFile" type="file" accept=".zip" />
        <button onclick="uploadModule()">آپلود</button>
        <p id="uploadMsg"></p>
      </div>
      <div class="grid" id="tiles"></div>
    </main>
  </div>

  <div id="settings-panel" class="settings-panel" onclick="if(event.target===this) closeSettings()">
    <div class="settings-form" role="dialog" aria-labelledby="settings-title">
      <h3 id="settings-title">تنظیمات ماژول</h3>
      <p id="settings-module-name" class="warn"></p>
      <div id="settings-warnings"></div>
      <label>پورت‌های داخل کانتینر (با کاما)</label>
      <input id="settings-ports" type="text" dir="ltr" placeholder="3000" />
      <div class="field-row">
        <div>
          <label>internalPort</label>
          <input id="settings-internal-port" type="number" dir="ltr" />
        </div>
        <div>
          <label>proxy prefix</label>
          <input id="settings-proxy-prefix" type="text" dir="ltr" />
        </div>
      </div>
      <label>proxy paths (با کاما)</label>
      <input id="settings-proxy-paths" type="text" dir="ltr" placeholder="api" />
      <div class="field-row">
        <div>
          <label>memory</label>
          <input id="settings-memory" type="text" dir="ltr" placeholder="256M" />
        </div>
        <div>
          <label>cpus</label>
          <input id="settings-cpus" type="text" dir="ltr" placeholder="0.2" />
        </div>
      </div>
      <label>GitHub repo (اختیاری)</label>
      <input id="settings-github-repo" type="url" dir="ltr" placeholder="https://github.com/org/repo" />
      <label>entry HTML</label>
      <input id="settings-entry-html" type="text" dir="ltr" placeholder="index.html" />
      <label>آیکون کارت (iconClass)</label>
      <input id="settings-icon-class" type="text" dir="ltr" placeholder="fas fa-cube" />
      <div class="settings-actions">
        <button onclick="saveSettings()">ذخیره و Running</button>
        <button class="secondary" onclick="closeSettings()">بستن</button>
      </div>
      <p id="settings-msg" class="warn"></p>
    </div>
  </div>

  <div id="gear-quick-panel" class="gear-quick-panel" onclick="if(event.target===this) closeDashboardGear()">
    <div class="gear-quick-form">
      <h3 id="gear-quick-title">مدیریت ماژول</h3>
      <p id="gear-quick-meta" class="warn"></p>
      <div class="actions">
        <button onclick="dashboardGearStart()">Start</button>
        <button class="secondary" onclick="dashboardGearStop()">Stop</button>
        <button class="secondary" onclick="dashboardGearLogs()">Logs</button>
        <button class="secondary" onclick="dashboardGearSettings()">Settings</button>
        <button class="danger" onclick="dashboardGearDelete()">Delete</button>
        <button class="secondary" onclick="dashboardGearPull()">Git Pull</button>
        <button class="secondary" onclick="dashboardPickPartialZip()">Partial ZIP</button>
        <input id="dashboard-partial-zip" type="file" accept=".zip" style="display:none" onchange="dashboardPartialUpload(event)" />
      </div>
      <pre id="gear-quick-logs" class="warn" style="max-height:120px;overflow:auto;direction:ltr;text-align:left"></pre>
      <button class="secondary" onclick="closeDashboardGear()">بستن</button>
    </div>
  </div>

  <script>
    let currentSettingsModuleId = null;
    let dashboardGearModuleId = null;

    async function api(path, opts = {}) {
      const res = await fetch('/api' + path, { credentials: 'same-origin', ...opts });
      if (res.status === 401) { document.getElementById('login').style.display = 'block'; document.getElementById('app').style.display = 'none'; throw new Error('auth'); }
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const err = new Error(data.error || data.errors?.join(', ') || 'request failed');
        err.payload = data;
        err.status = res.status;
        throw err;
      }
      return data;
    }

    async function login() {
      const password = document.getElementById('password').value;
      const r = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', body: JSON.stringify({ password }) });
      if (r.ok) { document.getElementById('login').style.display = 'none'; document.getElementById('app').style.display = 'block'; loadModules(); }
      else document.getElementById('loginError').textContent = 'رمز اشتباه';
    }

    async function logout() { await api('/logout', { method: 'POST' }); location.reload(); }

    function tileClass(mod) {
      return mod.status === 'settings_pending' ? 'tile settings-pending' : 'tile';
    }

    async function loadModules() {
      const { modules } = await api('/modules');
      const tiles = document.getElementById('tiles');
      tiles.innerHTML = modules.map(m => `
        <div class="${tileClass(m)}" data-id="${m.id}" onclick="onTileClick('${m.id}', '${m.status}', '${m.type}')" onmouseenter="loadStats('${m.id}')">
          ${m.type === 'standalone' ? `<button type="button" class="tile-gear" title="مدیریت" onclick="event.stopPropagation(); openDashboardGear('${m.id}', '${m.name}', '${m.status}')"><i class="fas fa-cog"></i></button>` : ''}
          <strong>${m.name}</strong>
          <span class="status ${m.status}" title="${m.status}"></span>
          <p>${m.description}</p>
          <small>${m.type} · v${m.version}</small>
          <div class="tooltip" id="stats-${m.id}"></div>
          <div class="actions" onclick="event.stopPropagation()">
            ${m.type === 'standalone' ? `<button onclick="openDashboardGear('${m.id}', '${m.name}', '${m.status}')">⚙ مدیریت</button>` : ''}
            ${m.type !== 'builtin' ? `<button class="danger" onclick="removeMod('${m.id}')">Delete</button>` : '<span class="warn">built-in</span>'}
          </div>
        </div>`).join('');
    }

    function openDashboardGear(id, name, status) {
      dashboardGearModuleId = id;
      document.getElementById('gear-quick-title').textContent = 'مدیریت: ' + name;
      document.getElementById('gear-quick-meta').textContent = id + ' · ' + status;
      document.getElementById('gear-quick-logs').textContent = '';
      document.getElementById('gear-quick-panel').classList.add('open');
    }

    function closeDashboardGear() {
      dashboardGearModuleId = null;
      document.getElementById('gear-quick-panel').classList.remove('open');
    }

    async function dashboardGearStart() {
      if (!dashboardGearModuleId) return;
      try {
        const r = await api('/modules/' + dashboardGearModuleId + '/start', { method: 'POST' });
        if (r.firewallWarning) alert(r.firewallWarning);
        closeDashboardGear(); loadModules();
      } catch (error) {
        if (error.payload?.needsSettings) { closeDashboardGear(); openSettings(dashboardGearModuleId); }
        else alert(error.message);
      }
    }

    async function dashboardGearStop() {
      if (!dashboardGearModuleId) return;
      await api('/modules/' + dashboardGearModuleId + '/stop', { method: 'POST' });
      closeDashboardGear(); loadModules();
    }

    async function dashboardGearLogs() {
      if (!dashboardGearModuleId) return;
      const { logs } = await api('/modules/' + dashboardGearModuleId + '/logs');
      document.getElementById('gear-quick-logs').textContent = logs || '(خالی)';
    }

    function dashboardGearSettings() {
      if (!dashboardGearModuleId) return;
      const id = dashboardGearModuleId;
      closeDashboardGear();
      openSettings(id);
    }

    async function dashboardGearDelete() {
      if (!dashboardGearModuleId) return;
      if (!confirm('حذف ماژول؟')) return;
      await api('/modules/' + dashboardGearModuleId, { method: 'DELETE' });
      closeDashboardGear(); loadModules();
    }

    async function dashboardGearPull() {
      if (!dashboardGearModuleId) return;
      if (!confirm('Git Pull — فایل‌های محلی ممکن است بازنویسی شوند. ادامه؟')) return;
      try {
        await api('/modules/' + dashboardGearModuleId + '/git-pull', { method: 'POST' });
        closeDashboardGear(); loadModules();
      } catch (error) {
        alert(error.payload?.errors?.join(', ') || error.message);
      }
    }

    function dashboardPickPartialZip() {
      document.getElementById('dashboard-partial-zip')?.click();
    }

    async function dashboardPartialUpload(event) {
      if (!dashboardGearModuleId) return;
      const file = event.target?.files?.[0];
      if (!file) return;
      const fd = new FormData();
      fd.append('partial', file);
      const res = await fetch('/api/modules/' + dashboardGearModuleId + '/partial-upload', {
        method: 'POST', body: fd, credentials: 'same-origin',
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) { alert(data.errors?.join(', ') || 'خطا'); return; }
      event.target.value = '';
      closeDashboardGear(); loadModules();
    }

    function onTileClick(id, status, type) {
      if (type === 'standalone' && status === 'settings_pending') {
        openSettings(id);
      }
    }

    async function openSettings(id) {
      currentSettingsModuleId = id;
      document.getElementById('settings-msg').textContent = '';
      const { settings } = await api('/modules/' + id + '/settings');
      document.getElementById('settings-module-name').textContent = 'ماژول: ' + id + ' · وضعیت: ' + settings.status;
      document.getElementById('settings-ports').value = (settings.ports || []).join(', ');
      document.getElementById('settings-internal-port').value = settings.internalPort ?? '';
      document.getElementById('settings-proxy-prefix').value = settings.proxyPrefix ?? '';
      document.getElementById('settings-proxy-paths').value = (settings.proxyPaths || ['api']).join(', ');
      document.getElementById('settings-memory').value = settings.memory ?? '';
      document.getElementById('settings-cpus').value = settings.cpus ?? '';
      document.getElementById('settings-github-repo').value = settings.github?.repo ?? '';
      document.getElementById('settings-entry-html').value = settings.entryHtml ?? 'index.html';
      document.getElementById('settings-icon-class').value = settings.layoutIconClass ?? '';
      document.getElementById('settings-warnings').innerHTML = (settings.warnings || [])
        .map(w => '<p class="warn">' + w + '</p>').join('');
      document.getElementById('settings-panel').classList.add('open');
    }

    function closeSettings() {
      document.getElementById('settings-panel').classList.remove('open');
      currentSettingsModuleId = null;
    }

    async function saveSettings() {
      if (!currentSettingsModuleId) return;
      const portsRaw = document.getElementById('settings-ports').value.split(',').map(v => parseInt(v.trim(), 10)).filter(n => !Number.isNaN(n));
      const proxyPaths = document.getElementById('settings-proxy-paths').value.split(',').map(v => v.trim()).filter(Boolean);
      const githubRepo = document.getElementById('settings-github-repo').value.trim();
      const payload = {
        ports: portsRaw,
        internalPort: parseInt(document.getElementById('settings-internal-port').value, 10),
        proxyPrefix: document.getElementById('settings-proxy-prefix').value.trim(),
        proxyPaths: proxyPaths.length ? proxyPaths : ['api'],
        memory: document.getElementById('settings-memory').value.trim() || undefined,
        cpus: document.getElementById('settings-cpus').value.trim() || undefined,
        entryHtml: document.getElementById('settings-entry-html').value.trim() || 'index.html',
        layoutIconClass: document.getElementById('settings-icon-class').value.trim() || undefined,
        github: githubRepo ? { repo: githubRepo } : undefined,
      };
      try {
        const result = await api('/modules/' + currentSettingsModuleId + '/settings', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (result.warnings?.length) {
          document.getElementById('settings-msg').textContent = result.warnings.join(' · ');
        }
        closeSettings();
        loadModules();
      } catch (error) {
        document.getElementById('settings-msg').textContent = error.payload?.errors?.join(', ') || error.message;
      }
    }

    async function loadStats(id) {
      if (!document.getElementById('stats-' + id)) return;
      try {
        const { stats } = await api('/modules/' + id + '/stats');
        if (stats) document.getElementById('stats-' + id).textContent = `CPU: ${stats.cpuPercent} · RAM: ${stats.memoryUsage}/${stats.memoryLimit}`;
      } catch {}
    }

    async function startMod(id) {
      try {
        const r = await api('/modules/' + id + '/start', { method: 'POST' });
        if (r.firewallWarning) alert(r.firewallWarning);
        loadModules();
      } catch (error) {
        if (error.payload?.needsSettings) openSettings(id);
        else alert(error.message);
      }
    }
    async function stopMod(id) { await api('/modules/' + id + '/stop', { method: 'POST' }); loadModules(); }
    async function viewLogs(id) { const { logs } = await api('/modules/' + id + '/logs'); alert(logs); }
    async function removeMod(id) { if (confirm('حذف ماژول؟')) { await api('/modules/' + id, { method: 'DELETE' }); loadModules(); } }

    async function uploadModule() {
      const file = document.getElementById('zipFile').files[0];
      if (!file) return;
      const fd = new FormData();
      fd.append('module', file);
      const res = await fetch('/api/modules/upload', { method: 'POST', body: fd, credentials: 'same-origin' });
      const data = await res.json();
      document.getElementById('uploadMsg').textContent = res.ok
        ? 'نصب شد: ' + data.moduleId + ' — تنظیمات را تکمیل کنید.'
        : data.errors?.join(', ') || 'خطا';
      if (res.ok) {
        await loadModules();
        if (data.moduleId) openSettings(data.moduleId);
      }
    }
  </script>
</body>
</html>
