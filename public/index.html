<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HaderBash | مراقبت هوشمند IoT + CMS حرفه‌ای</title>
    <!-- Fonts: Kalameh (Persian) + Inter (Latin) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/fonts/kalameh.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/css/card-canvas.css">
    <script src="/theme.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="rtl-container">
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>
    <div class="demo-container">
    <div class="header">
        <div class="logo-area">
            <div class="logo-hb">HB</div>
            <div>
                <h1><i class="fas fa-shield-alt"></i> HaderBash.ir</h1>
                <div class="header-subtitle">ماژولار · بدون لمس کد هسته</div>
            </div>
        </div>
        <div class="controls-row">
            <div class="dark-toggle" id="darkModeToggle">
                <i class="fas fa-moon"></i> <span id="darkModeLabel">دارک مود</span>
            </div>
            <div id="adminAuthMenuHost" class="admin-auth-menu-host"></div>
        </div>
    </div>

    <div class="breadcrumb-area" id="breadcrumbArea"></div>

    <canvas id="homeFloatingCanvas" aria-hidden="true"></canvas>
    <div id="cardCanvas" class="card-canvas" aria-label="شبکه کارت‌ها">
        <div id="ghostLayer" class="ghost-layer"></div>
        <div id="cardsWrapper" class="cards-wrapper">
            <div class="loading-state card-canvas-empty"><i class="fas fa-spinner fa-spin"></i> در حال بارگذاری...</div>
        </div>
        <div id="cardCanvasHeightHandle" class="card-canvas-height-handle" hidden aria-hidden="true" title="کشیدن برای بزرگ‌تر کردن بوم">
            <svg viewBox="0 0 24 8" aria-hidden="true">
                <line x1="4" y1="3" x2="20" y2="3" />
                <line x1="4" y1="6" x2="20" y2="6" />
            </svg>
        </div>
    </div>
</div>

<script src="/api-client.js"></script>
<script src="/admin-menu.js"></script>
<script src="/dialog.js"></script>
<script src="/home-floating-background.js"></script>
<script type="module" src="/js/card-canvas/card-canvas-app.js"></script>
<script src="/card-layout-editor.js"></script>
<script src="/script.js"></script>
</body>
</html>
