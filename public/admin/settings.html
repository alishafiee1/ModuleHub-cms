<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تنظیمات سراسری | ModuleHub CMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Vazirmatn:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <script src="/theme.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .settings-page { max-width: 960px; margin: 0 auto; padding: 2rem; position: relative; z-index: 1; }
        .settings-header-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .settings-help-banner {
            margin: 0.75rem 0 1.5rem;
            padding: 0.85rem 1.15rem;
            border-radius: 12px;
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.2);
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-primary);
        }
        .settings-help-banner i { margin-left: 0.5rem; color: #06b6d4; }
        .settings-cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.25rem;
        }
        .settings-card {
            padding: 1.35rem;
            border-radius: 18px;
            background: var(--card-glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: var(--card-shadow);
            border: 1px solid var(--card-glass-border);
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: right;
            font-family: inherit;
            color: inherit;
            width: 100%;
        }
        .settings-card:hover {
            box-shadow: var(--card-hover-shadow);
            border-color: #06b6d4;
            transform: translateY(-2px);
        }
        .settings-card-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: var(--primary-gradient, linear-gradient(135deg, #4f46e5, #06b6d4));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            margin-bottom: 0.85rem;
            box-shadow: 0 8px 18px -6px var(--glow-color, rgba(6, 182, 212, 0.4));
        }
        .settings-card-title {
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--text-title);
            margin: 0 0 0.4rem;
        }
        .settings-card-summary {
            font-size: 0.82rem;
            color: var(--text-desc);
            line-height: 1.5;
            margin: 0;
        }
        .settings-card-action {
            margin-top: 0.75rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: #06b6d4;
        }
        .swal-settings-field { margin-bottom: 0.85rem; text-align: right; }
        .swal-settings-field label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 0.35rem;
            cursor: pointer;
        }
        .swal-settings-field label:hover { color: #06b6d4; }
        .swal-settings-field input[type="number"],
        .swal-settings-field input[type="text"] {
            width: 100%;
            padding: 0.55rem 0.75rem;
            border-radius: 10px;
            border: 1px solid rgba(0, 0, 0, 0.12);
            font-family: inherit;
            box-sizing: border-box;
        }
        .swal-settings-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            cursor: pointer;
        }
        .swal-nic-options { display: flex; flex-direction: column; gap: 0.5rem; text-align: right; }
        .swal-nic-options label { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .backup-dialog-section { margin-bottom: 1.25rem; text-align: right; }
        .backup-dialog-toolbar { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: stretch; }
        .backup-dialog-toolbar .backup-create-btn { flex: 1 1 12rem; }
        .backup-section-title { font-size: 0.9rem; font-weight: 700; margin: 0 0 0.65rem; color: var(--text-title); }
        .backup-help-btn {
            padding: 0.65rem 0.85rem;
            border-radius: 12px;
            border: 1px solid rgba(6, 182, 212, 0.35);
            background: rgba(6, 182, 212, 0.08);
            color: #0891b2;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.82rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .backup-help-content { text-align: right; font-size: 0.85rem; line-height: 1.6; }
        .backup-help-content ul { margin: 0.35rem 0 0.85rem; padding-right: 1.25rem; }
        .backup-help-content code { direction: ltr; unicode-bidi: embed; }
        .backup-delete-warning { font-size: 0.88rem; margin: 0 0 0.75rem; line-height: 1.5; }
        .backup-create-btn {
            width: 100%;
            padding: 0.65rem 1rem;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            color: #fff;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
        }
        .backup-create-btn:disabled { opacity: 0.7; cursor: wait; }
        .backup-list { display: flex; flex-direction: column; gap: 0.65rem; max-height: 220px; overflow-y: auto; }
        .backup-list-item {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: space-between;
            align-items: center;
            padding: 0.65rem 0.75rem;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            background: rgba(255, 255, 255, 0.5);
        }
        .backup-list-item-info { display: flex; flex-direction: column; gap: 0.2rem; font-size: 0.8rem; }
        .backup-list-item-info strong { font-size: 0.78rem; word-break: break-all; }
        .backup-list-item-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }
        .backup-btn {
            padding: 0.35rem 0.6rem;
            border-radius: 8px;
            border: 1px solid rgba(6, 182, 212, 0.35);
            background: transparent;
            color: #0891b2;
            font-size: 0.75rem;
            font-family: inherit;
            cursor: pointer;
        }
        .backup-btn-restore { border-color: rgba(220, 38, 38, 0.35); color: #dc2626; }
        .backup-btn-delete { border-color: rgba(100, 116, 139, 0.45); color: #64748b; }
        .backup-file-input { width: 100%; margin-bottom: 0.5rem; font-size: 0.82rem; }
        .backup-confirm-label { display: flex; align-items: flex-start; gap: 0.5rem; font-size: 0.82rem; margin-bottom: 0.65rem; cursor: pointer; }
        .backup-upload-restore-btn {
            width: 100%;
            padding: 0.55rem;
            border-radius: 10px;
            border: 1px solid #dc2626;
            background: rgba(220, 38, 38, 0.08);
            color: #dc2626;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
        }
        .backup-upload-restore-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .backup-hint { font-size: 0.75rem; color: #64748b; margin: 0.5rem 0 0; line-height: 1.5; }
        .backup-hint-warning { color: #b45309; }
        .backup-empty-state { font-size: 0.82rem; color: #64748b; margin: 0; }
    </style>
</head>
<body class="rtl-container">
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>
    <div class="settings-page demo-container">
        <div class="header">
            <div class="logo-area">
                <div class="logo-hb">HB</div>
                <div>
                    <h1><i class="fas fa-cogs"></i> تنظیمات سراسری</h1>
                    <div class="header-subtitle">فقط Super Admin</div>
                </div>
            </div>
            <div class="settings-header-actions">
                <div id="adminAuthMenuHost" class="admin-auth-menu-host"></div>
                <a class="admin-login-link btn-link btn-secondary" href="/"><i class="fas fa-home"></i> بازگشت</a>
            </div>
        </div>

        <p class="settings-help-banner">
            <i class="fas fa-circle-info"></i>
            روی هر کارت کلیک کنید تا تنظیمات آن بخش را ویرایش کنید. برای راهنمای هر فیلد، روی عنوان آن در دیالوگ ضربه بزنید.
        </p>

        <div id="settingsCardsGrid" class="settings-cards-grid">
            <div class="loading-state"><i class="fas fa-spinner fa-spin"></i> در حال بارگذاری...</div>
        </div>
    </div>

    <script src="/api-client.js"></script>
    <script src="/admin-menu.js"></script>
    <script src="/admin/backup-settings-dialog.js"></script>
    <script src="/admin/settings.js"></script>
</body>
</html>
