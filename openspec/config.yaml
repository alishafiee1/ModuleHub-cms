schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
context: |
  Target platform: Ubuntu Server LTS (22.04 or 24.04) on bare metal or VPS.
  ModuleHub CMS runs natively on Linux — not Windows/macOS for production.
  Host stack: systemd, Docker Engine + Docker Compose plugin, UFW firewall, optional Nginx as external reverse proxy.
  Core user: dedicated Linux user (e.g. modulehub) in the docker group for socket access.
  Paths follow Linux conventions (/var/www, /opt/modulehub-cms, /etc/systemd/system).
  Development on Windows is allowed via WSL2 or remote SSH to Ubuntu; CI and deployment targets Ubuntu only.
  Tech stack: Node.js 20+, TypeScript, Express, dockerode, JSON registry (modules.json).
  Align with docs/README.md, docs/proposal.md, docs/design.md, docs/module-spec.md, docs/code-rolls.md, CLAUDE.md.

