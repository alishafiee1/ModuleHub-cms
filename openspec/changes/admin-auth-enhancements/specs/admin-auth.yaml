openapi: 3.0.3
info:
  title: ModuleHub CMS — Admin Auth (logout & change-password)
  version: 1.0.0
  description: Super Admin session logout and password change endpoints.

paths:
  /admin/logout:
    post:
      summary: Log out Super Admin or Module Manager session
      tags: [Super Admin Auth]
      security:
        - sessionCookie: []
        - csrfToken: []
      responses:
        '200':
          description: Session destroyed
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
                    example: Logged out
        '403':
          description: Missing or invalid CSRF token
        '429':
          description: Rate limit exceeded (loginRateLimitPerMinute)

  /admin/change-password:
    post:
      summary: Change Super Admin password
      tags: [Super Admin Auth]
      security:
        - sessionCookie: []
        - csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword, confirmPassword]
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
                  minLength: 8
                  description: At least 8 characters with letters and digits
                confirmPassword:
                  type: string
                  format: password
      responses:
        '200':
          description: Password updated; session cleared
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
                    example: Password changed
                  redirect:
                    type: string
                    example: /admin/login
        '400':
          description: Validation error (weak password, mismatch, missing fields)
        '401':
          description: Not authenticated or wrong current password
        '403':
          description: Missing or invalid CSRF token
        '429':
          description: Rate limit exceeded

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: modulehub.sid
    csrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token
